; /etc/php/8.3/fpm/pool.d/hexugo.conf
; Dedicated PHP-FPM pool for hexugo (isolated from www pool)

[hexugo]
user = deploy
group = www-data

listen = /run/php/php8.3-fpm-hexugo.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 40
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 10
pm.max_requests = 500
pm.process_idle_timeout = 30s

request_terminate_timeout = 60s
request_slowlog_timeout = 10s
slowlog = /var/log/php8.3-fpm-hexugo.slow.log

catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /var/log/php8.3-fpm-hexugo.error.log
php_admin_flag[log_errors] = on

; Sensible production limits (overrides php.ini per-pool)
php_admin_value[memory_limit] = 256M
php_admin_value[post_max_size] = 25M
php_admin_value[upload_max_filesize] = 25M
php_admin_value[max_execution_time] = 60
php_admin_value[expose_php] = off
