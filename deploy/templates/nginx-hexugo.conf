# /etc/nginx/sites-available/hexugo.conf
# Production nginx config for hexugo.com (Laravel API + React SPA)

# ---------- rate-limit zones (defined once, used in server blocks) ----------
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/s;

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name hexugo.com www.hexugo.com;

    # ACME challenge stays on HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://hexugo.com$request_uri;
    }
}

# ---------- www -> apex redirect (HTTPS) ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hexugo.com;

    ssl_certificate     /etc/letsencrypt/live/hexugo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hexugo.com/privkey.pem;

    return 301 https://hexugo.com$request_uri;
}

# ---------- main HTTPS server ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hexugo.com;

    root /var/www/hexugo/current/public;
    index index.php index.html;
    charset utf-8;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/hexugo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hexugo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Hide nginx version
    server_tokens off;

    # Body / buffer / timeout
    client_max_body_size 25M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    keepalive_timeout 65;
    send_timeout 60;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/javascript application/x-javascript application/json
        application/xml application/rss+xml application/atom+xml application/xhtml+xml
        application/x-font-ttf application/vnd.ms-fontobject
        font/opentype image/svg+xml image/x-icon;

    # Logs
    access_log /var/log/nginx/hexugo.access.log;
    error_log  /var/log/nginx/hexugo.error.log warn;

    # Block sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }
    location ~* \.(env|log|sql|sqlite|md|lock|json|yaml|yml|toml|ini|conf)$ {
        deny all;
        return 404;
    }
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Static asset caching (Vite-built frontend bundles)
    location /frontend/dist/assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Frontend SPA index for any other /frontend/dist/ path
    location /frontend/dist/ {
        try_files $uri /frontend/dist/index.html;
    }

    # API endpoints — auth/login has stricter rate limit
    location = /api/auth/login {
        limit_req zone=api_login burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }
    location ^~ /api/ {
        limit_req zone=api_general burst=120 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # Storage symlinked uploads
    location ^~ /storage/ {
        try_files $uri =404;
        expires 7d;
    }

    # Everything else — try Laravel public file, else fall through to React SPA
    location / {
        try_files $uri $uri/ /frontend/dist/index.html;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm-hexugo.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;

        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout 60s;

        fastcgi_hide_header X-Powered-By;
    }
}
